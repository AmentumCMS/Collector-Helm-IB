name: Push branch to Github Container Registry

on:
  push:
    branches-ignore:
      - 'main'
  release:
    types: [edited, released]
  workflow_dispatch:
  workflow_call:

env:
  REGISTRY: ghcr.io
  GH_TOKEN: ${{ github.token }}

jobs:
  ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3 
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.GH_TOKEN }}

      # - name: Extract metadata (tags, labels) for helm-plugged
      #   id: helm-plugged
      #   uses: docker/metadata-action@v5
      #   with:
      #     images: ${{ env.REGISTRY }}/${{ github.repository }}/helm-plugged

      # - name: Show metadata
      #   run: |
      #     echo "Registry: ${{ env.REGISTRY }}"
      #     echo "Version: ${{ steps.helm-plugged.outputs.version }}"
      #     echo "Tags: ${{ steps.helm-plugged.outputs.tags }}"
      #     echo "Labels: ${{ steps.helm-plugged.outputs.labels }}"

      - name: Build and push helm-plugged to GHCR
        id: docker_build_sync
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile          
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/helm-plugged:${{ github.ref_name }}
          # labels: ${{ steps.helm-plugged.outputs.labels }}
          push: true

      - name: Generate helm-plugged artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/helm-plugged:${{ github.ref_name }}
          subject-digest: ${{ steps.docker_build_sync.outputs.digest }}
          push-to-registry: true
